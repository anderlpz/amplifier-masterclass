<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Azure arrowhead — used on curved loop paths -->
    <marker id="az" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="none"
            stroke="#0082EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.80"/>
    </marker>

    <!-- THINK node highlight: elevated drop shadow -->
    <filter id="sh-think" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#0082EB" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8"  flood-color="#000"    flood-opacity="0.38"/>
    </filter>
    <!-- Standard node shadow -->
    <filter id="sh-node" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#000" flood-opacity="0.30"/>
    </filter>

    <!-- Subtle azure glow for the loop paths -->
    <filter id="path-glow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ─────────────────────────────────────────────
       GHOST CENTER TEXT: ORCHESTRATOR
       Very low opacity — present but recessive
       ───────────────────────────────────────────── -->
  <text x="250" y="256" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="11" font-weight="600" fill="#FAFAF8" letter-spacing="0.30em"
        opacity="0.07" text-anchor="middle">ORCHESTRATOR</text>

  <!-- ─────────────────────────────────────────────
       LOOP ARROWS (cubic bezier, clockwise)
       Drawn BEFORE nodes so nodes render on top
       ───────────────────────────────────────────── -->

  <!-- THINK → ACT  (right arc, top-right quadrant) -->
  <path d="M 313,85 C 390,85 415,165 415,228"
        stroke="#0082EB" stroke-width="1.75" opacity="0.62"
        marker-end="url(#az)" filter="url(#path-glow)"/>

  <!-- ACT → OBSERVE  (bottom arc, bottom-right quadrant) -->
  <path d="M 415,272 C 415,335 390,415 313,415"
        stroke="#0082EB" stroke-width="1.75" opacity="0.62"
        marker-end="url(#az)" filter="url(#path-glow)"/>

  <!-- OBSERVE → DECIDE  (left arc, bottom-left quadrant) -->
  <path d="M 187,415 C 110,415 85,335 85,272"
        stroke="#0082EB" stroke-width="1.75" opacity="0.62"
        marker-end="url(#az)" filter="url(#path-glow)"/>

  <!-- DECIDE → THINK  (top arc, top-left quadrant) -->
  <path d="M 85,228 C 85,165 110,85 187,85"
        stroke="#0082EB" stroke-width="1.75" opacity="0.62"
        marker-end="url(#az)" filter="url(#path-glow)"/>

  <!-- ─────────────────────────────────────────────
       NODES  (compass positions, glass-edge)
       Node size: 126×48 for THINK/OBSERVE,
                  112×48 for ACT/DECIDE
       ───────────────────────────────────────────── -->

  <!-- THINK (top) — elevated, azure highlight border -->
  <!-- Outer azure glow ring -->
  <rect x="186" y="60" width="128" height="50" rx="9"
        fill="none" stroke="#0082EB" stroke-width="1.5" opacity="0.30"/>
  <!-- Main node rect -->
  <rect x="188" y="62" width="124" height="46" rx="8"
        fill="rgba(255,255,255,0.06)" stroke="#0082EB" stroke-width="1" opacity="0.75"
        filter="url(#sh-think)"/>
  <text x="250" y="90" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#FAFAF8" letter-spacing="0.16em"
        text-anchor="middle">THINK</text>
  <!-- Active state indicator: small azure dot above -->
  <circle cx="250" cy="54" r="3" fill="#0082EB" opacity="0.55"/>

  <!-- ACT (right) -->
  <rect x="355" y="225" width="112" height="50" rx="8"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1"
        filter="url(#sh-node)"/>
  <text x="411" y="255" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#FAFAF8" letter-spacing="0.16em"
        text-anchor="middle">ACT</text>

  <!-- OBSERVE (bottom) -->
  <rect x="186" y="390" width="128" height="50" rx="8"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1"
        filter="url(#sh-node)"/>
  <text x="250" y="420" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#FAFAF8" letter-spacing="0.12em"
        text-anchor="middle">OBSERVE</text>

  <!-- DECIDE (left) -->
  <rect x="33" y="225" width="112" height="50" rx="8"
        fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)" stroke-width="1"
        filter="url(#sh-node)"/>
  <text x="89" y="255" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#FAFAF8" letter-spacing="0.12em"
        text-anchor="middle">DECIDE</text>

  <!-- ─────────────────────────────────────────────
       MICRO LABELS — subtle axis descriptors
       ───────────────────────────────────────────── -->
  <!-- Radial labels between nodes, very low opacity -->
  <text x="390" y="172" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="400" fill="#0082EB" letter-spacing="0.08em"
        opacity="0.38" text-anchor="middle">invoke</text>
  <text x="390" y="328" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="400" fill="#FAFAF8" letter-spacing="0.08em"
        opacity="0.22" text-anchor="middle">results</text>
  <text x="110" y="172" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="400" fill="#FAFAF8" letter-spacing="0.08em"
        opacity="0.22" text-anchor="middle">loop</text>
  <text x="110" y="328" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="400" fill="#FAFAF8" letter-spacing="0.08em"
        opacity="0.22" text-anchor="middle">next</text>
</svg>

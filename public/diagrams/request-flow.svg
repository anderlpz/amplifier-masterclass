<svg width="400" height="800" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Ink arrowhead (downward flow) -->
    <marker id="arr-ink" viewBox="0 0 9 9" refX="4.5" refY="8.5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1.5,1 L4.5,8 L7.5,1" fill="none"
            stroke="#1A1815" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.65"/>
    </marker>
    <!-- Tool-calls loop arrowhead (copper) -->
    <marker id="arr-copper" viewBox="0 0 9 9" refX="8" refY="4.5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0.5,0.5 L8,4.5 L0.5,8.5" fill="none"
            stroke="#C87B60" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.80"/>
    </marker>

    <!-- Node drop shadow on parchment -->
    <filter id="sh-node" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1A1815" flood-opacity="0.10"/>
    </filter>
    <!-- ORCHESTRATOR: slightly more prominent -->
    <filter id="sh-orch" x="-12%" y="-12%" width="124%" height="136%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1A1815" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- ─────────────────────────────────────────────
       PARCHMENT BACKGROUND
       ───────────────────────────────────────────── -->
  <rect width="400" height="800" fill="#F5F3EC"/>

  <!-- Subtle warm tint — editorial warmth on parchment -->
  <rect width="400" height="800" fill="#C87B60" opacity="0.014"/>

  <!-- ─────────────────────────────────────────────
       HOOKS SIDE RAIL — right column
       Dashed vertical line with label + connection dots
       x=336, copper accent
       ───────────────────────────────────────────── -->
  <!-- HOOKS label -->
  <text x="336" y="36" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="9" font-weight="600" fill="#C87B60" letter-spacing="0.18em" opacity="0.70"
        text-anchor="middle">HOOKS</text>

  <!-- Vertical dashed rail -->
  <line x1="336" y1="46" x2="336" y2="756"
        stroke="#C87B60" stroke-width="1" opacity="0.22" stroke-dasharray="4 4"/>

  <!-- Horizontal dotted lines from each node to rail -->
  <!-- USER (y_center=84) -->
  <line x1="290" y1="84" x2="334" y2="84"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="84" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- CLI (y_center=191) -->
  <line x1="290" y1="191" x2="334" y2="191"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="191" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- COORDINATOR (y_center=298) -->
  <line x1="290" y1="298" x2="334" y2="298"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="298" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- ORCHESTRATOR (y_center=405) -->
  <line x1="290" y1="405" x2="334" y2="405"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="405" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- PROVIDER (y_center=512) -->
  <line x1="290" y1="512" x2="334" y2="512"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="512" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- MODEL (y_center=619) -->
  <line x1="290" y1="619" x2="334" y2="619"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="619" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- RESPONSE (y_center=726) -->
  <line x1="290" y1="726" x2="334" y2="726"
        stroke="#C87B60" stroke-width="0.8" opacity="0.20" stroke-dasharray="2.5 3"/>
  <circle cx="336" cy="726" r="2.5" fill="#C87B60" opacity="0.35"/>

  <!-- ─────────────────────────────────────────────
       TOOL CALLS LOOP — left side arc
       From MODEL's left edge, around to ORCHESTRATOR's left edge
       ───────────────────────────────────────────── -->
  <path d="M 100,619 C 42,619 42,405 100,405"
        stroke="#C87B60" stroke-width="1.3" opacity="0.55"
        stroke-dasharray="none"
        marker-end="url(#arr-copper)"/>
  <!-- Label: rotated text along the arc -->
  <text font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" font-weight="500" fill="#C87B60" letter-spacing="0.10em" opacity="0.62"
        text-anchor="middle"
        transform="translate(28, 512) rotate(-90)">tool calls</text>

  <!-- ─────────────────────────────────────────────
       MAIN FLOW ARROWS (dark ink, downward)
       Between nodes: from bottom center to top center
       ───────────────────────────────────────────── -->
  <!-- USER → CLI -->
  <line x1="195" y1="108" x2="195" y2="167"
        stroke="#1A1815" stroke-width="1.2" opacity="0.35"
        marker-end="url(#arr-ink)"/>
  <!-- CLI → COORDINATOR -->
  <line x1="195" y1="215" x2="195" y2="274"
        stroke="#1A1815" stroke-width="1.2" opacity="0.35"
        marker-end="url(#arr-ink)"/>
  <!-- COORDINATOR → ORCHESTRATOR -->
  <line x1="195" y1="322" x2="195" y2="381"
        stroke="#1A1815" stroke-width="1.2" opacity="0.40"
        marker-end="url(#arr-ink)"/>
  <!-- ORCHESTRATOR → PROVIDER -->
  <line x1="195" y1="429" x2="195" y2="488"
        stroke="#1A1815" stroke-width="1.2" opacity="0.35"
        marker-end="url(#arr-ink)"/>
  <!-- PROVIDER → MODEL -->
  <line x1="195" y1="536" x2="195" y2="595"
        stroke="#1A1815" stroke-width="1.2" opacity="0.35"
        marker-end="url(#arr-ink)"/>
  <!-- MODEL → RESPONSE -->
  <line x1="195" y1="643" x2="195" y2="702"
        stroke="#1A1815" stroke-width="1.2" opacity="0.35"
        marker-end="url(#arr-ink)"/>

  <!-- ─────────────────────────────────────────────
       FLOW NODES (dark ink on parchment)
       x=100, width=190, height=48, centered x=195
       Node y_top values: 60, 167, 274, 381, 488, 595, 702
       ───────────────────────────────────────────── -->

  <!-- USER -->
  <rect x="100" y="60" width="190" height="48" rx="8"
        fill="rgba(26,24,21,0.03)" stroke="#1A1815" stroke-width="1" stroke-opacity="0.20"
        filter="url(#sh-node)"/>
  <text x="195" y="89" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#1A1815" letter-spacing="0.14em" opacity="0.75"
        text-anchor="middle">USER</text>

  <!-- CLI -->
  <rect x="100" y="167" width="190" height="48" rx="8"
        fill="rgba(26,24,21,0.03)" stroke="#1A1815" stroke-width="1" stroke-opacity="0.20"
        filter="url(#sh-node)"/>
  <text x="195" y="196" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#1A1815" letter-spacing="0.14em" opacity="0.75"
        text-anchor="middle">CLI</text>

  <!-- COORDINATOR -->
  <rect x="100" y="274" width="190" height="48" rx="8"
        fill="rgba(26,24,21,0.03)" stroke="#1A1815" stroke-width="1" stroke-opacity="0.22"
        filter="url(#sh-node)"/>
  <text x="195" y="303" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#1A1815" letter-spacing="0.12em" opacity="0.75"
        text-anchor="middle">COORDINATOR</text>

  <!-- ORCHESTRATOR — slightly more prominent (it's the active loop engine) -->
  <rect x="97" y="381" width="196" height="48" rx="8"
        fill="rgba(26,24,21,0.05)" stroke="#C87B60" stroke-width="1" stroke-opacity="0.45"
        filter="url(#sh-orch)"/>
  <!-- Subtle inner accent line -->
  <rect x="98" y="382" width="194" height="46" rx="7.5"
        fill="none" stroke="#C87B60" stroke-width="0.5" opacity="0.18"/>
  <text x="195" y="410" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1A1815" letter-spacing="0.10em" opacity="0.80"
        text-anchor="middle">ORCHESTRATOR</text>

  <!-- PROVIDER -->
  <rect x="100" y="488" width="190" height="48" rx="8"
        fill="rgba(26,24,21,0.03)" stroke="#1A1815" stroke-width="1" stroke-opacity="0.20"
        filter="url(#sh-node)"/>
  <text x="195" y="517" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#1A1815" letter-spacing="0.14em" opacity="0.75"
        text-anchor="middle">PROVIDER</text>

  <!-- MODEL -->
  <rect x="100" y="595" width="190" height="48" rx="8"
        fill="rgba(26,24,21,0.03)" stroke="#1A1815" stroke-width="1" stroke-opacity="0.20"
        filter="url(#sh-node)"/>
  <text x="195" y="624" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="600" fill="#1A1815" letter-spacing="0.16em" opacity="0.75"
        text-anchor="middle">MODEL</text>

  <!-- RESPONSE — final node, slightly more weight -->
  <rect x="100" y="702" width="190" height="48" rx="8"
        fill="rgba(26,24,21,0.06)" stroke="#1A1815" stroke-width="1" stroke-opacity="0.35"
        filter="url(#sh-node)"/>
  <text x="195" y="731" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" font-weight="700" fill="#1A1815" letter-spacing="0.14em" opacity="0.85"
        text-anchor="middle">RESPONSE</text>

  <!-- ─────────────────────────────────────────────
       MICRO LABELS — node subtitles (right-aligned)
       Very low opacity, adds depth without noise
       ───────────────────────────────────────────── -->
  <text x="284" y="89" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#1A1815" opacity="0.28" text-anchor="end">request</text>
  <text x="284" y="196" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#1A1815" opacity="0.28" text-anchor="end">parse · route</text>
  <text x="284" y="303" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#1A1815" opacity="0.28" text-anchor="end">session · dispatch</text>
  <text x="284" y="410" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#C87B60" opacity="0.40" text-anchor="end">think · act · decide</text>
  <text x="284" y="517" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#1A1815" opacity="0.28" text-anchor="end">format · send</text>
  <text x="284" y="624" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#1A1815" opacity="0.28" text-anchor="end">inference</text>
  <text x="284" y="731" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="8.5" fill="#1A1815" opacity="0.35" text-anchor="end">complete</text>
</svg>
